<!DOCTYPE html>
<html>
<head>
<title>Змейка</title>
<style>
body {
  background: black;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  margin: 0;
}
h1 { color: white; font-size: 22px; margin-bottom: 5px; }
#hisob { color: lime; font-size: 18px; margin-bottom: 8px; }
canvas { border: 3px solid green; background: #111; display: block; }
#tugmalar {
  display: grid;
  grid-template-columns: 60px 60px 60px;
  gap: 5px;
  margin-top: 15px;
}
#tugmalar button {
  width: 60px;
  height: 60px;
  font-size: 24px;
  background: #222;
  color: white;
  border: 2px solid green;
  border-radius: 10px;
}
</style>
</head>
<body>
<h1>Snake</h1>
<div id="hisob">Hisob: 0</div>
<canvas id="maydon" width="300" height="300"></canvas>
<div id="tugmalar">
  <div></div>
  <button onclick="yonal(0,-1)">U</button>
  <div></div>
  <button onclick="yonal(-1,0)">L</button>
  <button onclick="yonal(0,1)">D</button>
  <button onclick="yonal(1,0)">R</button>
</div>
<script type="text/javascript">
var c = document.getElementById("maydon");
var x = c.getContext("2d");
var k = 20;
var h = 0;
var mor = [{x:5,y:5},{x:4,y:5},{x:3,y:5}];
var dx = 1;
var dy = 0;
var ndx = 1;
var ndy = 0;
var food = {x:10,y:10};
function yonal(a,b) {
  if(a !== 0 && dx === 0) { ndx=a; ndy=b; }
  if(b !== 0 && dy === 0) { ndx=a; ndy=b; }
}
function step() {
  dx = ndx;
  dy = ndy;
  var bx = mor[0].x + dx;
  var by = mor[0].y + dy;
  if(bx<0||bx>=15||by<0||by>=15) {
    alert("Tamom! Hisob: "+h);
    mor=[{x:5,y:5},{x:4,y:5},{x:3,y:5}];
    dx=1;dy=0;ndx=1;ndy=0;h=0;
    document.getElementById("hisob").innerText="Hisob: 0";
    food={x:10,y:10};
    return;
  }
  for(var i=0;i<mor.length;i++) {
    if(bx===mor[i].x&&by===mor[i].y) {
      alert("Tamom! Hisob: "+h);
      mor=[{x:5,y:5},{x:4,y:5},{x:3,y:5}];
      dx=1;dy=0;ndx=1;ndy=0;h=0;
      document.getElementById("hisob").innerText="Hisob: 0";
      food={x:10,y:10};
      return;
    }
  }
  mor.unshift({x:bx,y:by});
  if(bx===food.x&&by===food.y) {
    h++;
    document.getElementById("hisob").innerText="Hisob: "+h;
    food={x:Math.floor(Math.random()*15),y:Math.floor(Math.random()*15)};
  } else {
    mor.pop();
  }
  x.fillStyle="#111";
  x.fillRect(0,0,300,300);
  x.fillStyle="lime";
  for(var j=0;j<mor.length;j++) {
    x.fillRect(mor[j].x*k,mor[j].y*k,k-2,k-2);
  }
  x.fillStyle="red";
  x.fillRect(food.x*k,food.y*k,k-2,k-2);
}
setInterval(step,200);
step();
</script>
</body>
</html>
